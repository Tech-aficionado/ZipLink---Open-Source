<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 24 24" role="img" aria-label="Ziplink logo">
  <defs>
    <linearGradient id="ziplink-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#635bff"/>
      <stop offset="0.55" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="24" height="24" rx="6" fill="url(#ziplink-gradient)"/>
  <!-- "Z" drawn as a link path: two nodes (long link -> short link) joined by a zigzag. -->
  <path d="M7 7.3 H17 L7 16.7 H17" fill="none" stroke="#ffffff" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="7" cy="7.3" r="2.05" fill="#ffffff"/>
  <circle cx="17" cy="16.7" r="2.05" fill="#ffffff"/>
</svg>
